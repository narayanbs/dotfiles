# vim:fileencoding=utf-8:foldmethod=marker
hide_window_decorations yes
tab_bar_style powerline
tab_powerline_style round
tab_bar_min_tabs 1

# BEGIN_KITTY_THEME
# Nordfox
include current-theme.conf
# END_KITTY_THEME



# BEGIN_KITTY_FONTS
font_family      family="FiraCode Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
